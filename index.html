<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exam Builder Pro</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<!-- Quill -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<!-- Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Word -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.0.3/docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- Sidebar -->
<div class="sidebar">

<h2>🎓 Exam Pro</h2>

<input type="file" id="excel">

<input type="number" id="qCount" placeholder="عدد الأسئلة">
<input type="number" id="formCount" placeholder="عدد النماذج">

<hr>

<h3>🎨 التخصيص</h3>

<label>حجم الخط</label>
<input type="range" id="fontSize" min="12" max="24" value="16">

<label>تباعد الأسطر</label>
<input type="range" id="lineHeight" min="1" max="2" step="0.1" value="1.5">

<label>المسافة بين الأسئلة</label>
<input type="range" id="qSpacing" min="5" max="20" value="10">

<label>اتجاه الخيارات</label>
<select id="optionLayout">
<option value="vertical">عمودي</option>
<option value="horizontal">أفقي</option>
</select>

<label>عدد الأعمدة</label>
<select id="columns">
<option value="1">عمود واحد</option>
<option value="2">عمودين</option>
</select>

<label>
<input type="checkbox" id="showAnswers">
إظهار الإجابات
</label>

<hr>

<button onclick="generate()">⚡ توليد</button>
<button onclick="exportPDF()">📄 PDF</button>
<button onclick="exportWord()">📝 Word</button>

</div>

<!-- Main -->
<div class="main">

<div class="card">
<h3>✏️ تصميم القالب</h3>
<div id="editor"></div>
</div>

<div class="card preview">
<h3>📄 المعاينة</h3>
<div id="preview"></div>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
