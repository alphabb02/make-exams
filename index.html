<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>Exam Builder Pro+</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<!-- Sidebar -->
<div class="sidebar">

<h3>🧱 عناصر</h3>

<button onclick="addBlock('title')">عنوان</button>
<button onclick="addBlock('text')">نص</button>
<button onclick="addBlock('questions')">أسئلة</button>
<button onclick="addBlock('line')">فاصل</button>

<hr>

<h3>⚙️ خصائص</h3>
<label>حجم الخط</label>
<input type="range" id="fontSize" min="12" max="30">

<label>لون النص</label>
<input type="color" id="color">

<button onclick="applyStyle()">تطبيق</button>

<hr>

<button onclick="exportPDF()">📄 PDF</button>

</div>

<!-- Canvas -->
<div class="canvas" id="canvas"></div>

</div>

<script src="app.js"></script>

</body>
</html>
