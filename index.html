<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>نظام إنشاء امتحانات احترافي</title>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.0.3/docx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body { font-family: Tahoma; background:#eee; }
#editor { height:300px; background:#fff; }
#preview { background:#fff; padding:20px; margin-top:20px;}
</style>

</head>

<body>

<h2>🎓 نظام امتحانات احترافي</h2>

<input type="file" id="excel">

<input id="qCount" type="number" placeholder="عدد الأسئلة">
<input id="formCount" type="number" placeholder="عدد النماذج">

<button onclick="saveTemplate()">💾 حفظ القالب</button>
<button onclick="loadTemplate()">📂 تحميل القالب</button>

<div id="editor"></div>

<button onclick="generate()">⚡ توليد</button>
<button onclick="exportPDF()">📄 PDF</button>
<button onclick="exportWord()">📝 Word</button>

<div id="preview"></div>

<script src="app.js"></script>

</body>
</html>
