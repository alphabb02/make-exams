<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Exam Builder Pro+</title>
<link rel="stylesheet" href="style.css">

<script src="libs/html2pdf.bundle.min.js"></script>
<script src="libs/xlsx.full.min.js"></script>
<script src="libs/docx.bundle.js"></script>
<script src="libs/FileSaver.min.js"></script>
<script src="libs/Sortable.min.js"></script>
</head>

<body>

<div class="app">

<div class="sidebar">
<h2>📘 Exam Builder</h2>

<button onclick="openSettings()">⚙️ إعدادات الامتحان</button>

<label>عدد النماذج</label>
<input id="modelsCount" type="number" value="3">

<label>عدد الأسئلة</label>
<input id="questionsCount" type="number" value="10">

<hr>

<label>شعار الوزارة</label>
<input type="file" accept="image/*" onchange="uploadLogo(this.files[0],'ministry')">

<label>شعار المدرسة</label>
<input type="file" accept="image/*" onchange="uploadLogo(this.files[0],'school')">

<label>ترويسة كاملة</label>
<input type="file" accept="image/*" onchange="uploadHeader(this.files[0])">

<hr>
<label>تحميل بنك الأسئلة (Excel)</label>
<input type="file" accept=".xlsx" onchange="loadExcel(this.files[0])">

<hr>
<button onclick="generateExams()">🚀 توليد الامتحانات</button>
<button onclick="openGrading()">✅ التصحيح</button>
</div>

<div class="preview" id="preview"></div>

</div>

<!-- ===== Modals ===== -->
<div id="settingsModal" class="modal"></div>
<div id="gradingModal" class="modal"></div>

<script src="app.js"></script>
</body>
</html>
